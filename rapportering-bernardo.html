<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapportering – Bernardo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.card{background:white;border:1px solid #e0ddd6;border-radius:16px;padding:24px;width:100%;max-width:480px;margin-top:8px}
.header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e0ddd6}
.header h1{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.header p{font-size:12px;color:#888}
.name-badge{display:inline-block;font-size:11px;font-weight:600;background:#FEF3E2;color:#854F0B;padding:2px 10px;border-radius:100px;margin-bottom:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#f5f4f0;color:#1a1a1a;font-family:inherit;transition:border .15s,background .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:#1a1a2e;background:white}
.radio-group{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.radio-option{position:relative}
.radio-option input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.radio-option label{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#555;background:#f5f4f0;transition:all .15s;text-align:center}
.radio-option input[type=radio]:checked + label{border-color:#1a1a2e;background:#1a1a2e;color:white}
.radio-option label .icon{font-size:16px}
.section{background:#f5f4f0;border-radius:10px;padding:14px;margin-bottom:14px;display:none}
.section.visible{display:block}
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:10px}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:#888;pointer-events:none}
.submit-btn{width:100%;padding:13px;font-size:14px;font-weight:600;background:#1a1a2e;color:white;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px}
.submit-btn:hover{background:#2d2d4a}
.submit-btn:active{background:#111122}
.success{display:none;text-align:center;padding:30px 20px}
.success .check{font-size:48px;margin-bottom:12px}
.success h2{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.success p{font-size:13px;color:#888;margin-bottom:20px}
.success button{padding:10px 24px;font-size:13px;font-weight:600;background:#f5f4f0;color:#1a1a2e;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-family:inherit}
.error-msg{font-size:11px;color:#A32D2D;margin-top:4px;display:none}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="formCard">
  <div class="header">
    <div class="name-badge">Bernardo</div>
    <h1>Rapportera affär eller möte</h1>
    <p>Fyll i direkt när affären är klar eller mötet är bokat.</p>
  </div>

  <div class="field">
    <label>Datum</label>
    <input type="date" id="datum">
    <div class="error-msg" id="err-datum">Fyll i datum</div>
  </div>

  <div class="field">
    <label>Vad rapporterar du?</label>
    <div class="radio-group">
      <div class="radio-option">
        <input type="radio" name="typ" id="typAffar" value="Affär" onchange="toggleSections()">
        <label for="typAffar"><span class="icon">💼</span> Affär</label>
      </div>
      <div class="radio-option">
        <input type="radio" name="typ" id="typMote" value="Möte" onchange="toggleSections()">
        <label for="typMote"><span class="icon">📅</span> Möte</label>
      </div>
    </div>
    <div class="error-msg" id="err-typ">Välj typ</div>
  </div>

  <!-- Affär-sektion -->
  <div class="section" id="sectionAffar">
    <div class="section-title">Affärsdetaljer</div>
    <div class="field">
      <label>Produkt</label>
      <div class="select-wrap">
        <select id="produkt">
          <option value="">Välj produkt…</option>
          <option value="DM Intervju">DM – Intervju (14 900 kr)</option>
          <option value="DM Podd">DM – Poddavsnitt (49 000 kr)</option>
          <option value="DM Partnership">DM – Partnership (29 990 kr)</option>
          <option value="DM Grafisk annons">DM – Grafisk annons</option>
          <option value="HO Helårspaketet">HO – Helårspaketet (69 000 kr)</option>
          <option value="HO Utgåva">HO – Utgåva (29 000 kr)</option>
          <option value="HO Grafisk annons">HO – Grafisk annons</option>
          <option value="Byrå">Byrå</option>
          <option value="Övrigt">Övrigt</option>
        </select>
      </div>
      <div class="error-msg" id="err-produkt">Välj produkt</div>
    </div>
    <div class="field">
      <label>Faktiskt fakturerat belopp (kr)</label>
      <input type="number" id="belopp" placeholder="0" min="0">
      <div class="error-msg" id="err-belopp">Fyll i belopp</div>
    </div>
    <div class="field" id="grafiskField" style="display:none">
      <label>Antal grafiska annonser</label>
      <input type="number" id="grafiska" placeholder="0" min="0">
    </div>
  </div>

  <!-- Möte-sektion -->
  <div class="section" id="sectionMote">
    <div class="section-title">Mötesdetaljer</div>
    <div class="field">
      <label>Antal bokade möten</label>
      <input type="number" id="moten" placeholder="0" min="1">
      <div class="error-msg" id="err-moten">Fyll i antal möten</div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">
    <span id="btnText">Skicka rapport</span>
    <div class="spinner" id="spinner"></div>
  </button>
</div>

<!-- Success-vy -->
<div class="card success" id="successCard">
  <div class="check">✅</div>
  <h2>Rapporten är skickad!</h2>
  <p id="successMsg">Tack Bernardo, din rapport har registrerats.</p>
  <button onclick="resetForm()">Rapportera igen</button>
</div>

<script>
// ── KONFIGURATION ──────────────────────────────────────────────
// Klistra in din Google Apps Script webb-app URL här:
const APPS_SCRIPT_URL = 'KLISTRA_IN_DIN_URL_HÄR';
const SÄLJARE = 'Bernardo';
// ──────────────────────────────────────────────────────────────

document.getElementById('datum').valueAsDate = new Date();

function toggleSections() {
  const typ = document.querySelector('input[name="typ"]:checked')?.value;
  document.getElementById('sectionAffar').classList.toggle('visible', typ === 'Affär');
  document.getElementById('sectionMote').classList.toggle('visible', typ === 'Möte');
}

document.getElementById('produkt')?.addEventListener('change', function() {
  const grafisk = this.value.includes('Grafisk');
  document.getElementById('grafiskField').style.display = grafisk ? 'block' : 'none';
  if (!grafisk) document.getElementById('grafiska').value = '';
});

function clearErrors() {
  document.querySelectorAll('.error-msg').forEach(e => e.style.display = 'none');
}

function showError(id) {
  document.getElementById(id).style.display = 'block';
}

function validate() {
  clearErrors();
  let ok = true;
  const datum = document.getElementById('datum').value;
  const typ = document.querySelector('input[name="typ"]:checked')?.value;
  if (!datum) { showError('err-datum'); ok = false; }
  if (!typ) { showError('err-typ'); ok = false; }
  if (typ === 'Affär') {
    if (!document.getElementById('produkt').value) { showError('err-produkt'); ok = false; }
    if (!document.getElementById('belopp').value) { showError('err-belopp'); ok = false; }
  }
  if (typ === 'Möte') {
    if (!document.getElementById('moten').value || document.getElementById('moten').value < 1) {
      showError('err-moten'); ok = false;
    }
  }
  return ok;
}

async function submitForm() {
  if (!validate()) return;

  const typ = document.querySelector('input[name="typ"]:checked').value;
  const payload = {
    säljare: SÄLJARE,
    datum: document.getElementById('datum').value,
    typ: typ,
    produkt: typ === 'Affär' ? document.getElementById('produkt').value : '',
    belopp: typ === 'Affär' ? Number(document.getElementById('belopp').value) : 0,
    grafiska: typ === 'Affär' ? Number(document.getElementById('grafiska').value || 0) : 0,
    moten: typ === 'Möte' ? Number(document.getElementById('moten').value) : 0,
  };

  document.getElementById('btnText').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('submitBtn').disabled = true;

  if (APPS_SCRIPT_URL === 'KLISTRA_IN_DIN_URL_HÄR') {
    await new Promise(r => setTimeout(r, 800));
    console.log('TEST-läge, data som skulle skickas:', payload);
    showSuccess(typ, payload);
    return;
  }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showSuccess(typ, payload);
  } catch (err) {
    alert('Något gick fel. Försök igen.');
    document.getElementById('btnText').style.display = 'block';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }
}

function showSuccess(typ, payload) {
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('successCard').style.display = 'block';
  const msg = typ === 'Affär'
    ? `${payload.produkt} – ${payload.belopp.toLocaleString('sv-SE')} kr registrerat.`
    : `${payload.moten} möte(n) registrerat.`;
  document.getElementById('successMsg').textContent = msg;
}

function resetForm() {
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('successCard').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('btnText').style.display = 'block';
  document.getElementById('spinner').style.display = 'none';
  document.querySelectorAll('input[type=number]').forEach(i => i.value = '');
  document.querySelectorAll('input[type=radio]').forEach(i => i.checked = false);
  document.getElementById('produkt').value = '';
  document.getElementById('sectionAffar').classList.remove('visible');
  document.getElementById('sectionMote').classList.remove('visible');
  document.getElementById('grafiskField').style.display = 'none';
  document.getElementById('datum').valueAsDate = new Date();
  clearErrors();
}
</script>
</body>
</html>
