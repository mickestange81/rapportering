<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utlägg – Commercial Insights</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --text: #1a1a18;
    --text2: #6b6a64;
    --text3: #9e9d97;
    --accent: #1a1a18;
    --green: #2d6a4f;
    --green-bg: #d8f3dc;
    --amber: #b5560a;
    --amber-bg: #fef3e2;
    --red: #9b2335;
    --red-bg: #fde8eb;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  header {
    background: var(--text);
    color: #fff;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .header-left h1 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .header-left p {
    font-size: 12px;
    opacity: 0.5;
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .visma-badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: var(--radius);
    padding: 4px 10px;
    color: rgba(255,255,255,0.7);
  }

  .visma-badge span {
    color: rgba(255,255,255,0.4);
    margin-right: 4px;
  }

  main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

  .month-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 10px;
  }

  select {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: none;
    cursor: pointer;
    outline: none;
    appearance: none;
    padding-right: 20px;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%231a1a18' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 2px center;
  }

  .btn-ghost {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: #ccc; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    color: var(--text);
  }

  .stat-val.green { color: var(--green); }
  .stat-val.amber { color: var(--amber); }

  .add-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); }

  input[type=text], input[type=number] {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 7px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=number]:focus { border-color: var(--text); }
  input[type=text] { width: 200px; }
  input[type=number] { width: 120px; }

  .btn-add {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 7px 18px;
    border: none;
    border-radius: var(--radius);
    background: var(--text);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.82; }

  .table-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .tbl-head {
    display: grid;
    grid-template-columns: 2fr 130px 120px 80px;
    gap: 8px;
    padding: 9px 16px;
    background: var(--surface2);
    border-bottom: 0.5px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
  }

  .tbl-row {
    display: grid;
    grid-template-columns: 2fr 130px 120px 80px;
    gap: 8px;
    padding: 11px 16px;
    align-items: center;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  .tbl-row:last-child { border-bottom: none; }
  .tbl-row:hover { background: var(--surface2); }
  .tbl-row.sent { opacity: 0.55; }
  .tbl-row.sent .row-name { text-decoration: line-through; color: var(--text3); }

  .row-name { font-size: 14px; }

  .row-amt input {
    width: 110px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: right;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge.pending { background: var(--amber-bg); color: var(--amber); }
  .badge.done { background: var(--green-bg); color: var(--green); }

  .btn-toggle {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 4px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .btn-toggle:hover { background: var(--surface2); }

  .btn-del {
    font-size: 13px;
    padding: 3px 8px;
    border: 0.5px solid transparent;
    border-radius: var(--radius);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .btn-del:hover { color: var(--red); border-color: var(--red-bg); background: var(--red-bg); }

  .actions-col { display: flex; gap: 6px; align-items: center; }

  .empty {
    padding: 3rem;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 2.5rem;
    font-family: 'DM Mono', monospace;
  }

  @media (max-width: 600px) {
    main { padding: 1.25rem 1rem; }
    .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .tbl-head, .tbl-row { grid-template-columns: 1fr 90px 36px; }
    .tbl-head span:nth-child(3), .tbl-row .row-status { display: none; }
    input[type=text] { width: 100%; }
    .add-card { flex-direction: column; }
    input[type=number] { width: 100%; }
    .row-amt input { width: 80px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Utlägg</h1>
    <p>Commercial Insights Sweden AB</p>
  </div>
  <div class="visma-badge"><span>→</span>xhxruf0088@vismadoc.net</div>
</header>

<main>
  <div class="month-bar">
    <select id="monthSel" onchange="render()"></select>
    <button class="btn-ghost" onclick="toggleAll()">Markera alla skickade</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="add-card">
    <div class="field">
      <label>Leverantör</label>
      <input type="text" id="newName" placeholder="Välj eller skriv..." list="vendors" autocomplete="off" />
      <datalist id="vendors"></datalist>
    </div>
    <div class="field">
      <label>Belopp (kr)</label>
      <input type="number" id="newAmt" placeholder="0" step="0.01" onkeydown="if(event.key==='Enter') addItem()" />
    </div>
    <button class="btn-add" onclick="addItem()">+ Lägg till</button>
  </div>

  <div class="table-wrap">
    <div class="tbl-head">
      <span>Leverantör</span>
      <span style="text-align:right">Belopp</span>
      <span class="row-status">Status</span>
      <span></span>
    </div>
    <div id="listBody"></div>
  </div>

  <div class="footer" id="footer"></div>
</main>

<script>
const VENDORS = [
  "Andreas mat","Blinkplan","Burrito Bar","Canva","ChatGPT","Cykel",
  "Flipsnack","Gemini","GoodTape","Google","Google Cloud","Gymkort",
  "Hotel","ICA","Instantly","Kaffebar","LinkedIn","Loopia",
  "MailChimp","Mailgun","Marknadsinfo","Mr French","Pampas","SATS",
  "Semrush","Seven Eleven","Taxi","Typeform","User Centric","VideoAsk"
].sort((a,b) => a.localeCompare(b, 'sv'));

const MONTHS = ["Januari","Februari","Mars","April","Maj","Juni",
                "Juli","Augusti","September","Oktober","November","December"];

let data = JSON.parse(localStorage.getItem('ci_utlagg_v1') || '{}');
function save() { localStorage.setItem('ci_utlagg_v1', JSON.stringify(data)); }
function currentMonth() { return document.getElementById('monthSel').value; }
function getItems(m) { return data[m] || []; }

function initMonthSel() {
  const sel = document.getElementById('monthSel');
  const now = new Date();
  for (let i = 0; i < 14; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    const opt = document.createElement('option');
    opt.value = key; opt.textContent = key;
    sel.appendChild(opt);
  }
}

function initVendors() {
  const dl = document.getElementById('vendors');
  VENDORS.forEach(v => {
    const o = document.createElement('option'); o.value = v; dl.appendChild(o);
  });
}

function addItem() {
  const name = document.getElementById('newName').value.trim();
  const raw = document.getElementById('newAmt').value;
  const amt = parseFloat(raw);
  if (!name) { document.getElementById('newName').focus(); return; }
  const m = currentMonth();
  if (!data[m]) data[m] = [];
  data[m].push({ id: Date.now(), name, amt: isNaN(amt) ? null : amt, sent: false });
  save();
  document.getElementById('newName').value = '';
  document.getElementById('newAmt').value = '';
  document.getElementById('newName').focus();
  render();
}

function toggleSent(m, id) {
  const item = (data[m] || []).find(x => x.id === id);
  if (item) { item.sent = !item.sent; save(); render(); }
}

function updateAmt(m, id, val) {
  const item = (data[m] || []).find(x => x.id === id);
  if (item) { item.amt = val === '' ? null : parseFloat(val); save(); renderStats(); }
}

function deleteItem(m, id) {
  data[m] = (data[m] || []).filter(x => x.id !== id);
  save(); render();
}

function toggleAll() {
  const m = currentMonth();
  const items = getItems(m);
  if (!items.length) return;
  const allSent = items.every(x => x.sent);
  items.forEach(x => x.sent = !allSent);
  save(); render();
}

function fmt(n) {
  return Math.round(n).toLocaleString('sv') + ' kr';
}

function renderStats() {
  const m = currentMonth();
  const items = getItems(m);
  const total = items.reduce((s, x) => s + (x.amt || 0), 0);
  const sentAmt = items.filter(x => x.sent).reduce((s, x) => s + (x.amt || 0), 0);
  const pending = items.filter(x => !x.sent).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">Totalt denna månad</div>
      <div class="stat-val">${fmt(total)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Skickat till Visma</div>
      <div class="stat-val green">${fmt(sentAmt)}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Ej skickade</div>
      <div class="stat-val ${pending > 0 ? 'amber' : 'green'}">${pending} st</div>
    </div>
  `;
}

function render() {
  const m = currentMonth();
  const items = getItems(m);
  renderStats();
  const body = document.getElementById('listBody');

  if (items.length === 0) {
    body.innerHTML = '<div class="empty">Inga utlägg registrerade för ' + m + '</div>';
    document.getElementById('footer').textContent = '';
    return;
  }

  body.innerHTML = items.map(x => `
    <div class="tbl-row ${x.sent ? 'sent' : ''}">
      <span class="row-name">${x.name}</span>
      <span class="row-amt">
        <input type="number" value="${x.amt !== null ? x.amt : ''}" placeholder="–"
          style="text-align:right"
          onchange="updateAmt('${m}',${x.id},this.value)" />
      </span>
      <span class="row-status">
        <span class="badge ${x.sent ? 'done' : 'pending'}">${x.sent ? '✓ skickat' : 'ej skickat'}</span>
      </span>
      <span class="actions-col">
        <button class="btn-toggle" onclick="toggleSent('${m}',${x.id})">${x.sent ? 'Ångra' : 'Skickat'}</button>
        <button class="btn-del" onclick="deleteItem('${m}',${x.id})">✕</button>
      </span>
    </div>
  `).join('');

  const lastSaved = new Date().toLocaleString('sv');
  document.getElementById('footer').textContent = 'Sparad lokalt · ' + lastSaved;
}

initMonthSel();
initVendors();
render();
</script>
</body>
</html>
