<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uppgifter — Commercial Insights</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c8c5bc;
    --text: #1a1917;
    --muted: #888580;
    --faint: #b5b2aa;
    --today-dot: #2a2a28;
    --daily-accent: #3d6b4f;
    --daily-bg: #eef5f0;
    --daily-border: #c2daca;
    --project-accent: #4a5fa8;
    --project-bg: #eef0f8;
    --project-border: #c4cce8;
    --strategic-accent: #8b5e1a;
    --strategic-bg: #f7f0e6;
    --strategic-border: #e0cda8;
    --danger: #c0392b;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-date {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
    margin-left: auto;
  }

  .reset-all {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .reset-all:hover { background: var(--border); color: var(--text); }

  main { max-width: 680px; margin: 0 auto; padding: 24px 16px 0; }

  .layer { margin-bottom: 28px; }

  .layer-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .layer-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .layer-count {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .cnt-today    { background: var(--bg); color: var(--muted); border: 1px solid var(--border-strong); }
  .cnt-daily    { background: var(--daily-bg); color: var(--daily-accent); }
  .cnt-project  { background: var(--project-bg); color: var(--project-accent); }
  .cnt-strategic{ background: var(--strategic-bg); color: var(--strategic-accent); }

  .layer-line { flex: 1; height: 1px; background: var(--border); }

  .task-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--bg); }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--faint);
  }

  .task-cb {
    width: 17px;
    height: 17px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: var(--text);
    margin-top: 1px;
  }

  .task-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
  }

  .task-del {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--faint);
    cursor: pointer;
    border-radius: 5px;
    flex-shrink: 0;
    border: none;
    background: none;
    transition: all 0.15s;
    opacity: 0;
  }
  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { background: #fde8e8; color: var(--danger); }

  .add-row {
    display: flex;
    gap: 0;
    margin-top: 8px;
  }

  .add-input {
    flex: 1;
    height: 38px;
    border: 1px solid var(--border-strong);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    padding: 0 12px;
    font-size: 14px;
    font-family: var(--sans);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-input:focus { border-color: var(--text); }
  .add-input::placeholder { color: var(--faint); }

  .add-btn {
    height: 38px;
    padding: 0 16px;
    background: var(--text);
    color: var(--surface);
    border: 1px solid var(--text);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 18px;
    cursor: pointer;
    font-family: var(--sans);
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.8; }

  .empty-msg {
    padding: 16px 14px;
    font-size: 13px;
    color: var(--faint);
    font-style: italic;
    text-align: center;
  }

  .layer-today .task-list { border-color: var(--border-strong); }
  .layer-daily .task-list { border-left: 3px solid var(--daily-accent); }
  .layer-project .task-list { border-left: 3px solid var(--project-accent); }
  .layer-strategic .task-list { border-left: 3px solid var(--strategic-accent); }

  @media (max-width: 480px) {
    header { padding: 14px 16px; }
    main { padding: 16px 12px 0; }
    .task-del { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <h1>Commercial Insights</h1>
  <span class="header-date" id="header-date"></span>
  <button class="reset-all" onclick="resetDaily()">Nollställ dag</button>
</header>

<main>
  <div id="app"></div>
</main>

<script>
const KEY = 'ci_todo_v1';

const FIXED_DAILY = [
  { id: 'd1', text: 'Kontakta minst 5 nya leads' },
  { id: 'd2', text: 'Följa upp möten / bokade samtal' },
  { id: 'd5', text: 'Lägga upp artiklar på DagensMedarbetare' },
  { id: 'd6', text: 'Lägga upp artiklar på HållbarOmställning' },
  { id: 'd7', text: 'LinkedIn — DagensMedarbetare' },
  { id: 'd8', text: 'LinkedIn — HållbarOmställning' },
  { id: 'd9', text: 'TikTok' },
];

const FIXED_PROJECT = [
  { id: 'p1', text: 'Fixa löner' },
  { id: 'p2', text: 'Boka möte Jonas Lindell' },
  { id: 'p3', text: 'Boka Frida' },
  { id: 'p4', text: 'Boka nya möten' },
  { id: 'p5', text: 'Skicka mejl till alla om nästa nummer' },
  { id: 'p6', text: 'Säkerställa att Pipedrive funkar' },
  { id: 'p7', text: 'Lägga upp IVL, MFL, CityMail-klipp' },
];

const FIXED_STRATEGIC = [
  { id: 's1', text: 'Sätta ihop paket 1, 2 och 3 för DM och HO' },
  { id: 's2', text: 'Skapa leadssamlare: bolag som rekryterar (DM)' },
  { id: 's3', text: 'AI-artikel-erbjudande: automatiska medarbetarberättelser' },
  { id: 's4', text: 'Jaga leads — strukturerat, ej ad hoc' },
  { id: 's5', text: 'DM contentstrategi: pressansvariga, citat, LinkedIn + TikTok' },
  { id: 's6', text: 'DM ska följa relevanta sidor på LinkedIn' },
  { id: 's7', text: 'Skapa CityMail-klipp: HO, e-handel + fossilfritt' },
  { id: 's8', text: 'Starta TikTok (DM + HO)' },
];

let state = {
  today: [],       // { id, text }
  done: {},        // id -> true
  projectDone: {}, // id -> true (fixed project tasks removed when done)
  strategicDone: {},
  customProject: [], // { id, text } user-added
  customStrategic: [],
};

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if (saved) state = Object.assign(state, saved);
  } catch {}
}

function saveState() {
  localStorage.setItem(KEY, JSON.stringify(state));
}

function resetDaily() {
  state.done = {};
  saveState();
  render();
}

function addToday(text) {
  if (!text.trim()) return;
  state.today.push({ id: 't' + Date.now(), text: text.trim() });
  saveState();
  render();
}

function addProject(text) {
  if (!text.trim()) return;
  state.customProject.push({ id: 'cp' + Date.now(), text: text.trim() });
  saveState();
  render();
}

function addStrategic(text) {
  if (!text.trim()) return;
  state.customStrategic.push({ id: 'cs' + Date.now(), text: text.trim() });
  saveState();
  render();
}

function toggleDone(id, layer) {
  if (layer === 'daily') {
    if (state.done[id]) { delete state.done[id]; }
    else { state.done[id] = true; }
  } else if (layer === 'today' || layer === 'project' || layer === 'strategic') {
    // for today/project/strategic: remove after short delay
    setTimeout(() => {
      if (layer === 'today') {
        state.today = state.today.filter(t => t.id !== id);
      } else if (layer === 'project') {
        state.projectDone[id] = true;
        state.customProject = state.customProject.filter(t => t.id !== id);
      } else if (layer === 'strategic') {
        state.strategicDone[id] = true;
        state.customStrategic = state.customStrategic.filter(t => t.id !== id);
      }
      saveState();
      render();
    }, 350);
  }
  saveState();
  render();
}

function deleteTask(id, layer) {
  if (layer === 'today') state.today = state.today.filter(t => t.id !== id);
  else if (layer === 'project') state.customProject = state.customProject.filter(t => t.id !== id);
  else if (layer === 'strategic') state.customStrategic = state.customStrategic.filter(t => t.id !== id);
  saveState();
  render();
}

function makeTaskEl(task, layer, deletable) {
  const isDone = layer === 'daily' ? !!state.done[task.id] : false;
  const div = document.createElement('div');
  div.className = 'task-item' + (isDone ? ' done' : '');
  div.dataset.id = task.id;

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'task-cb';
  cb.checked = isDone;
  cb.addEventListener('change', () => toggleDone(task.id, layer));

  const lbl = document.createElement('div');
  lbl.className = 'task-text';
  lbl.textContent = task.text;

  div.appendChild(cb);
  div.appendChild(lbl);

  if (deletable) {
    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '×';
    del.title = 'Ta bort';
    del.addEventListener('click', () => deleteTask(task.id, layer));
    div.appendChild(del);
  }

  return div;
}

function makeAddRow(placeholder, onAdd) {
  const row = document.createElement('div');
  row.className = 'add-row';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'add-input';
  inp.placeholder = placeholder;

  const btn = document.createElement('button');
  btn.className = 'add-btn';
  btn.textContent = '+';

  const doAdd = () => { onAdd(inp.value); inp.value = ''; inp.focus(); };
  btn.addEventListener('click', doAdd);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

  row.appendChild(inp);
  row.appendChild(btn);
  return row;
}

function makeLayer(key, label, countClass, tasks, layer, addPlaceholder, onAdd, showDelete) {
  const wrap = document.createElement('div');
  wrap.className = 'layer layer-' + key;

  const hdr = document.createElement('div');
  hdr.className = 'layer-header';

  const lbl = document.createElement('span');
  lbl.className = 'layer-label';
  lbl.textContent = label;

  const remaining = layer === 'daily'
    ? tasks.filter(t => !state.done[t.id]).length + '/' + tasks.length
    : tasks.length + ' kvar';

  const cnt = document.createElement('span');
  cnt.className = 'layer-count ' + countClass;
  cnt.textContent = layer === 'daily'
    ? (tasks.length - tasks.filter(t => !state.done[t.id]).length) + '/' + tasks.length + ' klara'
    : tasks.length + ' kvar';

  const line = document.createElement('div');
  line.className = 'layer-line';

  hdr.appendChild(lbl);
  hdr.appendChild(cnt);
  hdr.appendChild(line);
  wrap.appendChild(hdr);

  const list = document.createElement('div');
  list.className = 'task-list';

  if (tasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-msg';
    empty.textContent = layer === 'today' ? 'Inga snabbuppgifter idag' : 'Allt klart';
    list.appendChild(empty);
  } else {
    tasks.forEach(t => list.appendChild(makeTaskEl(t, layer, showDelete)));
  }

  wrap.appendChild(list);
  wrap.appendChild(makeAddRow(addPlaceholder, onAdd));
  return wrap;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Today layer
  app.appendChild(makeLayer(
    'today', 'Idag — snabba uppgifter', 'cnt-today',
    state.today, 'today',
    'Lägg till snabbuppgift…', addToday, true
  ));

  // Daily layer
  app.appendChild(makeLayer(
    'daily', 'Löpande — varje dag', 'cnt-daily',
    FIXED_DAILY, 'daily',
    'Lägg till löpande uppgift…', () => {}, false
  ));

  // Project layer
  const projectTasks = [
    ...FIXED_PROJECT.filter(t => !state.projectDone[t.id]),
    ...state.customProject,
  ];
  app.appendChild(makeLayer(
    'project', 'Projekt — den här veckan', 'cnt-project',
    projectTasks, 'project',
    'Lägg till projektuppgift…', addProject, true
  ));

  // Strategic layer
  const strategicTasks = [
    ...FIXED_STRATEGIC.filter(t => !state.strategicDone[t.id]),
    ...state.customStrategic,
  ];
  app.appendChild(makeLayer(
    'strategic', 'Strategiskt — bygger framtiden', 'cnt-strategic',
    strategicTasks, 'strategic',
    'Lägg till strategisk uppgift…', addStrategic, true
  ));
}

// Date in header
const days = ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];
const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
const now = new Date();
document.getElementById('header-date').textContent =
  days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];

loadState();
render();
</script>
</body>
</html>
